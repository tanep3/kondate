{% extends "base.html" %}

{% block title %}献立一覧 - Kondate{% endblock %}

{% block content %}
<div class="container">
    <div class="page-header">
        <div>
            <h2>献立一覧</h2>
            <div class="search-box">
                <input type="text" id="search-input" placeholder="🔍 献立名や食材で検索...">
                <button id="search-button" class="btn-secondary">検索</button>
            </div>
        </div>
        <a href="/dishes/new" class="btn-primary">➕ 新規作成</a>
    </div>

    <div class="tabs">
        <button class="tab active" data-type="all">すべて</button>
        <button class="tab" data-type="main">主菜</button>
        <button class="tab" data-type="side">副菜</button>
        <button class="tab" data-type="soup">汁物</button>
        <button class="tab" data-type="staple">主食</button>
        <button class="tab" data-type="dessert">デザート</button>
        <button class="tab" data-type="brain">血栓の病気に良い</button>
    </div>

    <div class="dishes-grid" id="dishes-grid">
        <!-- 献立カードがここに表示されます -->
        <div class="empty-state">
            <p>🍽️ 読み込み中...</p>
        </div>
    </div>

    <!-- ページネーション -->
    <div id="pagination" class="pagination" style="display: none;">
        <button id="prev-page" class="btn-secondary" disabled>前のページ</button>
        <span id="page-info">ページ 1 / 1</span>
        <button id="next-page" class="btn-secondary">次のページ</button>
    </div>
</div>
{% endblock %}

{% block scripts %}
<script>
let currentType = 'all';
let currentPage = 1;
let totalPages = 1;
let currentQuery = null;  // 検索クエリを保存
const itemsPerPage = 30;

// ページ読み込み時に献立一覧を取得
document.addEventListener('DOMContentLoaded', function() {
    // セッションストレージからタグ検索を取得
    const tagSearch = sessionStorage.getItem('tagSearch');
    if (tagSearch) {
        // 検索ボックスに値をセット
        document.getElementById('search-input').value = tagSearch;
        // 検索を実行
        performSearch(tagSearch);
        // セッションストレージをクリア
        sessionStorage.removeItem('tagSearch');
    } else {
        // 通常ロード
        loadDishes();
    }
});

// 献立一覧を取得
async function loadDishes(type = 'all', page = 1) {
    currentType = type;
    currentPage = page;

    // ローディング表示
    document.getElementById('dishes-grid').innerHTML = `
        <div class="loading">
            <div class="spinner"></div>
        </div>
    `;

    try {
        const skip = (page - 1) * itemsPerPage;
        const params = { 
            skip: skip,
            limit: itemsPerPage
        };
        if (type !== 'all') {
            if (type === 'brain') {
                params.good_for_brain_health = 'true';
            } else {
                params.type = type;
            }
        }

        const response = await api.getDishes(params);
        // レスポンス構造を修正
        const items = response.data ? response.data.items : response.items || [];
        const total = response.data ? response.data.total : response.total || 0;
        
        // 総ページ数を計算
        totalPages = Math.ceil(total / itemsPerPage);
        
        displayDishes(items);
        updatePagination();
    } catch (error) {
        console.error('Failed to load dishes:', error);
        const errorMessage = error.message || 'ネットワークエラーが発生しました';
        document.getElementById('dishes-grid').innerHTML = `
            <div class="empty-state error-state">
                <p>❌ 読み込みに失敗しました</p>
                <p class="error-detail">${errorMessage}</p>
                <button onclick="loadDishes('${currentType}', 1)" class="btn-primary">再読み込み</button>
            </div>
        `;
    }
}

// 献立カードを表示
function displayDishes(dishes, showSimilarity = false) {
    const grid = document.getElementById('dishes-grid');

    if (!dishes || dishes.length === 0) {
        grid.innerHTML = `
            <div class="empty-state">
                <p>🍽️ 献立がまだ登録されていません</p>
                <a href="/dishes/new" class="btn-primary">最初の献立を登録する</a>
            </div>
        `;
        return;
    }

    grid.innerHTML = dishes.map(dish => `
        <div class="dish-card" tabindex="0" role="button" aria-label="${escapeHtml(dish.name)}の詳細を見る" onclick="location.href='/dishes/${dish.id}'" onkeydown="handleDishCardKeydown(event, ${dish.id})">
            ${showSimilarity && dish.similarity !== undefined ? `
                <div class="similarity-badge">類似度: ${(dish.similarity * 100).toFixed(0)}%</div>
            ` : ''}
            <h3>${escapeHtml(dish.name)}</h3>
            <div class="dish-meta">
                <span class="dish-badge type-${dish.type}">${getTypeLabel(dish.type)}</span>
                ${dish.difficulty ? `<span class="dish-badge">${getDifficultyLabel(dish.difficulty)}</span>` : ''}
                ${dish.prep_time ? `<span class="dish-badge">⏱️ ${dish.prep_time}分</span>` : ''}
            </div>
            ${dish.good_for_brain_health ? '<p class="good-for-brain">✓ 血栓の病気に良い</p>' : ''}
            <div class="dish-nutrition">
                ${dish.calories && dish.servings ? `<div class="nutrition-item">🔥 ${Math.round(dish.calories / dish.servings)}kcal</div>` : ''}
                ${dish.protein && dish.servings ? `<div class="nutrition-item">💪 ${Math.round(dish.protein / dish.servings)}g</div>` : ''}
                ${dish.sodium && dish.servings ? `<div class="nutrition-item">🧂 ${Math.round(dish.sodium / dish.servings)}g</div>` : ''}
            </div>
            ${dish.tags && dish.tags.length > 0 ? `
                <div class="dish-tags">
                    ${dish.tags.map(tag => `<span class="tag clickable-tag" data-tag="${escapeHtml(tag.name)}">#${escapeHtml(tag.name)}</span>`).join('')}
                </div>
            ` : ''}
        </div>
    `).join('');
}

// タブ切り替え
document.querySelectorAll('.tab').forEach(tab => {
    tab.addEventListener('click', function() {
        document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
        this.classList.add('active');
        loadDishes(this.dataset.type);
    });
});

// 検索機能
let searchTimeout;
document.getElementById('search-input').addEventListener('input', function(e) {
    clearTimeout(searchTimeout);
    searchTimeout = setTimeout(() => {
        performSearch(e.target.value);
    }, 500);
});

document.getElementById('search-button').addEventListener('click', function() {
    const query = document.getElementById('search-input').value;
    performSearch(query);
});

// ページネーションを更新
function updatePagination() {
    const pagination = document.getElementById('pagination');
    const pageInfo = document.getElementById('page-info');
    const prevBtn = document.getElementById('prev-page');
    const nextBtn = document.getElementById('next-page');

    if (totalPages <= 1) {
        pagination.style.display = 'none';
        return;
    }

    pagination.style.display = 'flex';
    pageInfo.textContent = `ページ ${currentPage} / ${totalPages}`;
    
    prevBtn.disabled = currentPage === 1;
    nextBtn.disabled = currentPage === totalPages;
}

// 前のページ
document.getElementById('prev-page').addEventListener('click', () => {
    if (currentPage > 1) {
        if (currentQuery) {
            performSearch(currentQuery, currentPage - 1);
        } else {
            loadDishes(currentType, currentPage - 1);
        }
    }
});

// 次のページ
document.getElementById('next-page').addEventListener('click', () => {
    if (currentPage < totalPages) {
        if (currentQuery) {
            performSearch(currentQuery, currentPage + 1);
        } else {
            loadDishes(currentType, currentPage + 1);
        }
    }
});

async function performSearch(query, page = 1) {
    if (!query.trim()) {
        loadDishes(currentType);
        return;
    }

    currentQuery = query;
    currentPage = page;

    // ローディング表示
    document.getElementById('dishes-grid').innerHTML = `
        <div class="loading">
            <div class="spinner"></div>
        </div>
    `;

    try {
        // 検索時も献立タイプフィルタを適用
        let url = `/api/search/dishes?q=${encodeURIComponent(query)}&limit=100`;
        if (currentType !== 'all') {
            if (currentType === 'brain') {
                url += `&good_for_brain_health=true`;
            } else {
                url += `&type=${currentType}`;
            }
        }
        const response = await fetch(url);
        if (!response.ok) {
            throw new Error(`検索に失敗しました (Status: ${response.status})`);
        }
        const data = await response.json();
        
        // 総ページ数を計算
        const totalItems = data.items || [];
        totalPages = Math.ceil(totalItems.length / itemsPerPage);
        
        // ページネーション適用
        const startIndex = (page - 1) * itemsPerPage;
        const endIndex = startIndex + itemsPerPage;
        const paginatedItems = totalItems.slice(startIndex, endIndex);
        
        displayDishes(paginatedItems, true);  // 検索結果は類似度を表示
        updatePagination();
    } catch (error) {
        console.error('Search failed:', error);
        const errorMessage = error.message || 'ネットワークエラーが発生しました';
        document.getElementById('dishes-grid').innerHTML = `
            <div class="empty-state error-state">
                <p>❌ 検索に失敗しました</p>
                <p class="error-detail">${errorMessage}</p>
                <button onclick="loadDishes('${currentType}')" class="btn-primary">一覧に戻る</button>
            </div>
        `;
    }
}

// タグクリックイベント（イベント委譲）
document.addEventListener('click', function(e) {
    if (e.target.classList.contains('clickable-tag')) {
        const tag = e.target.dataset.tag;
        document.getElementById('search-input').value = `#${tag}`;
        performSearch(`#${tag}`);
    }
});

// ユーティリティ関数
function escapeHtml(text) {
    const div = document.createElement('div');
    div.textContent = text;
    return div.innerHTML;
}

function getTypeLabel(type) {
    const labels = {
        'main': '主菜',
        'side': '副菜',
        'soup': '汁物',
        'staple': '主食',
        'dessert': 'デザート'
    };
    return labels[type] || type;
}

function getDifficultyLabel(difficulty) {
    const labels = {
        'easy': '簡単',
        'medium': '普通',
        'hard': '難しい'
    };
    return labels[difficulty] || difficulty;
}

// 献立カードのキーボードイベントハンドラ
function handleDishCardKeydown(event, dishId) {
    if (event.key === 'Enter' || event.key === ' ') {
        event.preventDefault();
        location.href = `/dishes/${dishId}`;
    }
}
</script>
{% endblock %}
