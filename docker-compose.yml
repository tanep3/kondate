# BuildKitを明示的に有効化（Linuxユーザー向け）
x-buildkit: &buildkit
  environment:
    - DOCKER_BUILDKIT=1
    - COMPOSE_DOCKER_CLI_BUILD=1

services:
  kondate:
    build:
      context: .
      dockerfile: Dockerfile
    <<: *buildkit
    container_name: kondate
    ports:
      - "10141:10141"
    volumes:
      # データ永続化
      - ./datas:/app/datas
      # uvキャッシュ（BuildKit cacheで高速化）
      - uv-cache:/root/.cache/uv
      # ruriキャッシュ（エンベディングモデル）
      - ruri-cache:/app/.cache
    environment:
      - TZ=Asia/Tokyo
      - PYTHONUNBUFFERED=1
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:10141/docs"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 5s

volumes:
  uv-cache:
    driver: local
  ruri-cache:
    driver: local

# ネットワーク（オプション）
